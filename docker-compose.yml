services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coparse
      POSTGRES_PASSWORD: coparse_dev
      POSTGRES_DB: coparse
    ports:
      - "5432:5432"
    volumes:
      - coparse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coparse -d coparse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  coparse_pgdata:
